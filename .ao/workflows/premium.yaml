# ═══════════════════════════════════════════════════════════════════════════
#  PHASES — Command-mode phases (deterministic gates)
# ═══════════════════════════════════════════════════════════════════════════
phases:
  unit-test:
    mode: command
    directive: "Run the workspace test suite"
    command:
      program: cargo
      args: ["test", "--workspace"]
      timeout_secs: 600

  lint:
    mode: command
    directive: "Run clippy with deny warnings"
    command:
      program: cargo
      args: ["clippy", "--workspace", "--", "-D", "warnings"]
      timeout_secs: 120

  lead-research:
    mode: agent
    system_prompt: |
      You are a sales research analyst. Research the company "{{COMPANY}}"
      and contact "{{CONTACT_EMAIL}}". Lead source: {{SOURCE}}.

      1. Search the web for the company's website, recent news, funding, tech stack
      2. Pull existing data from HubSpot
      3. Identify industry, size, and likely pain points
      4. Check ICP match
      5. Produce a structured research brief

      Be factual. Flag when information is uncertain. Include source URLs.
    directive: "Research prospect {{COMPANY}} for lead qualification"

  incident-fix:
    mode: agent
    system_prompt: |
      You are a hotfix engineer. This is an active incident — speed is critical.

      Rules:
      1. Make the MINIMUM change needed to resolve the issue
      2. Do not refactor surrounding code
      3. Add a regression test for the specific failure
      4. Use git log to check for recent regressions that may be the cause
      5. Create a high-priority AO task for any proper fix needed later

      Bias toward reverting a bad change over writing a complex fix.
    directive: "Create minimal hotfix for active incident"


# ═══════════════════════════════════════════════════════════════════════════
#  PIPELINES
# ═══════════════════════════════════════════════════════════════════════════
pipelines:

  # ─── ENGINEERING ─────────────────────────────────────────────────────────

  - id: premium
    name: "Premium"
    description: >
      Maximum quality 12-phase engineering pipeline. Triage, requirements
      refinement, research, architecture review, implementation, deterministic
      test+lint gates, code review, security review, integration testing,
      and PO sign-off. Auto-merges on success.
    phases:
      - triage
      - refine-requirements
      - research
      - requirements:
          on_verdict:
            rework:
              target: refine-requirements
      - architecture-review:
          on_verdict:
            rework:
              target: implementation
      - implementation
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - code-review:
          on_verdict:
            rework:
              target: implementation
      - security-review:
          on_verdict:
            rework:
              target: implementation
      - integration-test:
          on_verdict:
            rework:
              target: implementation
      - po-review:
          on_verdict:
            rework:
              target: implementation
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  - id: hotfix
    name: "Hotfix"
    description: "Emergency pipeline — skip planning, keep gates, auto-merge"
    phases:
      - implementation
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - code-review:
          on_verdict:
            rework:
              target: implementation
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  - id: review-only
    name: "Review Only"
    description: "Review pre-existing changes without implementation"
    phases:
      - unit-test
      - lint
      - code-review:
          on_verdict:
            rework:
              target: code-review
      - security-review
      - po-review

  # ─── SALES ───────────────────────────────────────────────────────────────

  - id: lead-qualify
    name: "Lead Qualification"
    description: >
      Research prospect, score against ICP, enrich CRM, and route to
      appropriate sales motion. Connects HubSpot, web search, and Slack.
    variables:
      - name: COMPANY
        description: "Company name or domain to research"
        required: true
      - name: CONTACT_EMAIL
        description: "Primary contact email address"
      - name: SOURCE
        description: "Lead source channel"
        default: "inbound"
    phases:
      - lead-research
      - lead-score
      - lead-enrich
      - lead-route

  - id: proposal
    name: "Proposal Generation"
    description: >
      End-to-end proposal workflow: pull deal context, draft personalized
      proposal, calculate pricing, review, and deliver to prospect.
    variables:
      - name: DEAL_ID
        description: "HubSpot deal ID"
        required: true
      - name: PRICING_TIER
        description: "Pricing tier to quote"
        default: "growth"
      - name: DISCOUNT_PERCENT
        description: "Discount percentage to apply"
        default: "0"
    phases:
      - proposal-discovery
      - proposal-draft
      - proposal-pricing
      - proposal-review:
          on_verdict:
            rework:
              target: proposal-draft
      - proposal-send

  - id: deal-room
    name: "Deal Room"
    description: >
      Assemble a curated deal room with case studies, ROI calculator,
      product docs, and compliance materials. Personalized per prospect.
    phases:
      - deal-gather
      - deal-compile
      - deal-customize
      - proposal-review:
          on_verdict:
            rework:
              target: deal-customize
      - deal-deliver

  # ─── MARKETING ──────────────────────────────────────────────────────────

  - id: content-pipeline
    name: "Content Pipeline"
    description: >
      Full editorial workflow: research topic, create outline, write draft,
      editorial review with rework loop, SEO optimization, and publish.
    variables:
      - name: AUDIENCE
        description: "Target audience for the content"
        required: true
      - name: TONE
        description: "Writing tone"
        default: "professional"
      - name: FORMAT
        description: "Output format"
        default: "blog-post"
      - name: WORD_COUNT
        description: "Target word count"
        default: "2000"
      - name: KEYWORDS
        description: "Comma-separated target keywords"
    phases:
      - content-research
      - content-outline
      - content-draft
      - content-edit:
          on_verdict:
            rework:
              target: content-draft
      - seo-review:
          on_verdict:
            rework:
              target: content-draft
      - content-publish

  - id: competitor-intel
    name: "Competitive Intelligence"
    description: >
      Scan competitor activity, analyze positioning changes, produce
      intel brief, and distribute to product and sales teams.
    variables:
      - name: COMPETITOR
        description: "Competitor company name or domain to analyze"
        required: true
      - name: FOCUS
        description: "Analysis focus area"
        default: "all"
    phases:
      - competitor-scan
      - competitor-analyze
      - competitor-brief
      - competitor-distribute

  # ─── CUSTOMER SUCCESS ───────────────────────────────────────────────────

  - id: ticket-triage
    name: "Ticket Triage"
    description: >
      Classify support ticket severity, investigate root cause in codebase,
      and route to appropriate team. Creates eng tasks for P0/P1.
    phases:
      - ticket-classify
      - ticket-investigate
      - ticket-route

  - id: customer-escalation
    name: "Customer Escalation"
    description: >
      High-priority pipeline for customer-reported issues. Research context,
      refine requirements, implement fix with full gates and security review.
    phases:
      - research
      - refine-requirements
      - implementation
      - unit-test:
          on_verdict:
            rework:
              target: implementation
      - lint:
          on_verdict:
            rework:
              target: implementation
      - security-review:
          on_verdict:
            rework:
              target: implementation
      - code-review:
          on_verdict:
            rework:
              target: implementation
      - po-review:
          on_verdict:
            rework:
              target: implementation
    post_success:
      merge:
        strategy: squash
        target_branch: main
        create_pr: true
        auto_merge: true
        cleanup_worktree: true

  - id: health-check
    name: "Customer Health Check"
    description: >
      Analyze customer usage, billing, and support data to calculate
      health score. Generate save playbook for at-risk accounts.
    phases:
      - health-analyze
      - health-score
      - health-playbook
      - health-alert

  - id: onboarding
    name: "Customer Onboarding"
    description: >
      Generate personalized onboarding experience: setup guide, milestone
      tasks, and scheduled check-ins based on deal context and plan.
    variables:
      - name: CUSTOMER_ID
        description: "HubSpot company/contact ID"
        required: true
      - name: PLAN_TIER
        description: "Subscription plan tier"
        default: "growth"
      - name: CSM_EMAIL
        description: "Assigned CSM email for calendar invites"
    phases:
      - onboard-profile
      - onboard-guide
      - onboard-milestones
      - onboard-schedule

  # ─── OPERATIONS ──────────────────────────────────────────────────────────

  - id: incident-response
    name: "Incident Response"
    description: >
      Full incident lifecycle: detect, investigate root cause, create and
      deploy fix via hotfix pipeline, communicate to customers, and write
      blameless postmortem with action items.
    phases:
      - incident-detect
      - incident-investigate
      - incident-fix
      - incident-communicate
      - incident-postmortem

  - id: release-notes
    name: "Release Notes"
    description: >
      Generate customer-facing release notes from git log, review for
      accuracy and tone, and publish with team announcement.
    variables:
      - name: SINCE_TAG
        description: "Git tag or ref to diff from"
        required: true
      - name: VERSION
        description: "Version number for this release"
        required: true
      - name: CHANNEL
        description: "Slack channel for announcement"
        default: "#product-updates"
    phases:
      - release-gather
      - release-draft
      - release-review:
          on_verdict:
            rework:
              target: release-draft
      - release-publish

  - id: research-spike
    name: "Research Spike"
    description: "Investigation pipeline — triage, research, requirements. No implementation."
    phases:
      - triage
      - research
      - requirements
