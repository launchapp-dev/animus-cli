tools_allowlist:
  - ao

phase_catalog:
  builtin-vision-draft-command:
    label: Vision Draft
    description: Draft the project vision using the builtin planning command.
    category: planning
    tags: ["planning", "vision", "builtin"]

phases:
  builtin-vision-draft-command:
    mode: command
    command:
      program: ao
      args:
        - --json
        - --project-root
        - "{{project_root}}"
        - vision
        - draft
        - --input-json
        - "{{dispatch_input}}"
      cwd_mode: project_root
      parse_json_output: true

workflows:
  - id: builtin/vision-draft
    name: Builtin Vision Draft
    description: Draft the project vision through the shipped planning workflow.
    phases:
      - builtin-vision-draft-command
