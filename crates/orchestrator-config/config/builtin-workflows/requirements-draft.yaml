tools_allowlist:
  - ao

phase_catalog:
  builtin-requirements-draft-command:
    label: Requirements Draft
    description: Draft requirements using the builtin planning command.
    category: planning
    tags: ["planning", "requirements", "builtin"]

phases:
  builtin-requirements-draft-command:
    mode: command
    command:
      program: ao
      args:
        - --json
        - --project-root
        - "{{project_root}}"
        - requirements
        - draft
        - --input-json
        - "{{dispatch_input}}"
      cwd_mode: project_root
      parse_json_output: true

workflows:
  - id: builtin/requirements-draft
    name: Builtin Requirements Draft
    description: Draft requirements through the shipped planning workflow.
    phases:
      - builtin-requirements-draft-command
